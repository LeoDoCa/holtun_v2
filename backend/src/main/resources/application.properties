spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8088}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:holtun}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:MEzxjwOxngelfvIbw3lrnFuFerdMRkIKTGSwRNB40H1widbqOQEgtcqCJ4A5unFR9CVMSRV9T1HS8zfNBGdyBt}
jwt.expiration=${JWT_EXPIRATION:86400000}

admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:$H4dmin_123!}

spring.web.error.whitelabel.enabled=false
spring.web.error.include-exception=false
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.web.resources.add-mappings=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${FILE_MAX_SIZE:50MB}
spring.servlet.multipart.max-request-size=${FILE_MAX_REQUEST_SIZE:100MB}
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.resolve-lazily=false

server.tomcat.max-http-form-post-size=-1
server.tomcat.max-parameter-count=5000
server.tomcat.max-swallow-size=-1
server.tomcat.max-part-count=50

file.upload-dir=${FILE_UPLOAD_DIR:/app/uploads}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true

logging.file.name=${LOGGING_FILE:./logs/app.log}
logging.level.root=INFO
logging.level.holtun.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

spring.jackson.time-zone=America/Mexico_City

frontend.url=${FRONTEND_URL:http://localhost}